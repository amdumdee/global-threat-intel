name: Notify site

on:
  push:
    branches: [ main ]
    paths:
      - '**.yaml'
      - '**.yml'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger website rebuild
        run: |
          curl -s -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.SITE_REBUILD_TOKEN }}" \
            https://api.github.com/repos/AmDumDee/amdumdee.github.io/dispatches \
            -d '{"event_type":"content-updated"}'
