      cloud and container environments, (4) current AI offensive capability threat
      model — when was it last updated and does it reflect 2026 AI capability levels.
      Ongoing metrics should include network control plane exposure score, patch lag
      by system criticality tier, and supply chain dependency risk inventory.

    disclosure_requirements: |
      If Cisco SD-WAN compromise is confirmed, SEC 8-K cyber disclosure may be
      required within four business days for material incidents. FedRAMP environments
