      decision: "Identify all executive, legal, and communications staff using Signal and issue immediate credential hygiene guidance with registration lock enforcement"
      business_justification: "Historical message archives — not just future communications — are the target. Legal privilege, M&A discussions, and board communications stored in Signal backups represent irreversible intelligence exposure if compromised."
      cost_estimate: "Policy and training rollout: $2K-$8K. Security key hardware for high-risk users: $50-$100 per person."

    - priority: "High"
