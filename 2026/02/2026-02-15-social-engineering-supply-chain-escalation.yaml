---
threat_summary:
  title: "Social Engineering at Scale: Nation-State Supply Chain Attacks,
    Weaponized Google Services, and the End of Platform Trust"
  report_date: "2026-02-15"
  threat_id: "TI-20260215-001"
  severity_business: "Critical"
  severity_technical: "Critical"

  executive_summary: |
    On February 15, 2026, three converging threat disclosures confirmed that
    attackers have fully industrialized social engineering as a primary
    enterprise attack vector. North Korea's Lazarus Group ran a nine-month
    fake recruitment campaign on LinkedIn, Reddit, and Facebook, tricking
    developers into running malicious code during fake job interviews. One
    package accumulated 10,000+ downloads before the malicious payload was
    pushed. Simultaneously, attackers weaponized Google Groups, Google Docs,
    and Google Drive to distribute credential-stealing malware to global
    organizations, bypassing security filters that trust Google infrastructure.

    Microsoft disclosed a new variant of the ClickFix attack — where employees
    are manipulated into running commands on their own machines — now using DNS
    as a covert delivery channel to evade detection. Lumma Stealer, one of the
    most active credential-theft tools in circulation, is now distributed
    through at least six distinct attack chains including fake CAPTCHAs, piracy
    sites, AI platform links, and Google-sponsored search results.

    Boards must recognize this as a structural shift: the perimeter is no
    longer the target. Employees, developers, and trusted platforms are. Time
    sensitivity is critical — these campaigns are active, ongoing, and
    specifically designed to evade existing enterprise controls.

threat_intelligence:
  what_happened:
    incident_overview: |
      Lazarus Group (North Korea) ran a campaign named "graphalgo" since May
      2025, creating a fake blockchain company called Veltrix Capital with
      legitimate-looking websites and GitHub organizations. Developers were
      approached on LinkedIn, Facebook, and Reddit with job opportunities.
      Interview tasks directed candidates to GitHub repositories containing
      projects that depended on malicious npm and PyPI packages. When
      candidates ran the tasks, malware executed silently. One package,
      bigmathutils, reached 10,000+ downloads before attackers pushed the
      malicious update — demonstrating patience and supply chain sophistication.

      A separate active campaign abused 4,000+ Google Groups and 3,500
      Google-hosted URLs to distribute Lumma Stealer (Windows) and a
      trojanized browser called Ninja Browser (Linux). Posts in industry
      forums appeared as legitimate technical discussions before embedding
      download links. Because delivery infrastructure ran on Google-owned
      services, standard trust-based filtering did not flag the content.

      Microsoft disclosed a DNS-based variant of ClickFix where employees
      are shown fake error messages or CAPTCHA screens and instructed to
      run commands that trigger malware downloads. The new version routes
      payloads through DNS queries — normal network traffic — making it
      invisible to web content filters. The final payload is ModeloRAT, a
      remote access tool that gives attackers persistent control.

    affected_organizations:
      - name: "Software development teams globally"
        impact: "Developer machine compromise, credential theft, crypto
          wallet access, lateral movement into production systems"
      - name: "Enterprises using Google Workspace and Google services"
        impact: "Credential harvesting via trusted Google infrastructure;
          session token theft enabling cloud account takeover"
      - name: "Organizations with Mac users"
        impact: "Active macOS credential theft campaigns targeting 103
          Chrome crypto extensions and Keychain data; previously
          underprotected environment"
      - name: "Cryptocurrency and fintech sector"
        impact: "Direct financial theft via wallet seed phrase exfiltration;
          irreversible transaction risk"

    attack_methodology: |
      Lazarus Group's methodology is a four-month trust-building operation.
      Fake companies are created with AI-generated content, real-looking
      GitHub activity, and manufactured contributor networks. Victims are
      recruited through professional platforms and given coding tasks that
      appear legitimate. The malicious payload is embedded as a dependency —
      not in the task itself — so the candidate never sees suspicious code.
      Once executed, a remote access trojan is installed with file access,
      command execution, and crypto wallet targeting.

      The Google Groups campaign exploits platform trust: security tools
      treat google.com domains as safe. Attackers post in industry-relevant
      forums, embed download links with organization-specific branding, and
      deliver oversized archives (950MB) padded with empty data to bypass
      antivirus file-size limits. The actual malware is 33MB hidden inside.

      ClickFix exploits procedural trust — employees follow what appear to
      be IT instructions. The DNS variant hides the download request inside
      routine network traffic, making behavioral detection significantly
      harder. No vulnerability is exploited. The user executes the attack.

  why_it_matters:
    business_risks:
      financial_exposure: |
        Developer machine compromise via Lazarus Group provides access to
        source code repositories, cloud credentials, API keys, and
        production deployment pipelines. A single compromised senior
        developer can expose an entire codebase and cloud environment.
        Lumma Stealer specifically targets session cookies — bypassing MFA
        — enabling immediate cloud account takeover without needing
        passwords. Average cost of a supply chain breach: $4.88M base
        (IBM 2024), 40% higher than standard breaches. Crypto theft via
        seed phrase exfiltration is instantaneous and irreversible.

      regulatory_compliance: |
        Developer credential theft leading to customer data access triggers
        GDPR 72-hour notification. Session cookie theft enabling cloud
        account access may constitute a reportable breach under CCPA, HIPAA
        (if health data accessible), and SEC material disclosure rules for
        public companies. Lazarus Group is a sanctioned North Korean entity
        — any ransom payment or indirect financial interaction carries OFAC
        violation risk. Supply chain compromise affecting software products
        may trigger customer breach notification obligations downstream.

      competitive_impact: |
        Source code theft via compromised developer machines represents
        direct IP loss. For software companies, this means competitors —
        or state actors — gaining access to unreleased products, proprietary
        algorithms, and customer data architectures. The Lazarus campaign
        specifically targets cryptocurrency and blockchain firms, suggesting
        both financial and intelligence collection motives. Organizations
        that cannot demonstrate supply chain security controls will face
        increasing scrutiny in enterprise procurement and cyber insurance
        underwriting.

      operational_disruption: |
        A compromised developer machine with production access can require
        full credential rotation across cloud environments, CI/CD pipelines,
        and code repositories — a process taking days to weeks and halting
        release cycles. Remote access trojan installation creates persistent
        attacker presence that survives password resets unless the device
        is fully reimaged. Google Groups-based campaigns targeting multiple
        employees simultaneously can trigger parallel compromise events
        that overwhelm incident response capacity.

    industry_patterns:
      affected_sectors:
        - "Software development and technology"
        - "Cryptocurrency and blockchain"
        - "Financial services and fintech"
        - "Any enterprise with developer or engineering teams"
        - "Organizations using Google Workspace"

      trend_analysis: |
        These incidents confirm a two-year acceleration in human-targeted,
        platform-abusing attack campaigns. ClickFix alone has spawned six
        named variants in under 24 months. Lazarus Group has run continuous
        fake recruitment campaigns since at least 2023, evolving each
        iteration to rebuild credibility after exposure. The weaponization
        of Google's trusted ecosystem is a deliberate bypass of security
        investments in perimeter and content filtering. This pattern is
        worsening: attacker operational patience (9-month campaigns) is
        increasing while defender detection windows remain measured in weeks.

