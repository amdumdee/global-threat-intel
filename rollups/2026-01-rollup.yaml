rollup_summary:
  title: "January 2026 Threat Intelligence Rollup — The Trust Economy Collapses"
  period: "January 2026"
  period_type: "monthly"
  rollup_id: "RU-202601-001"
  reports_synthesized: 38

  executive_summary: |
    January 2026 opened with a thesis that held for every single one of its
    38 reports: attackers had stopped trying to break through enterprise
    defenses and started walking through the front door. The month's defining
    pattern — visible from day one through day thirty-one — was the systematic
    exploitation of trusted systems. Identity providers, software supply chains,
    AI platforms, residential proxy networks, browser extensions, CI/CD
    pipelines, and security appliances themselves were the entry points. Not
    vulnerabilities in the traditional sense — trust assumptions that
    organizations had never audited.

    The second defining thread was the convergence of nation-state and criminal
    tactics into a single, industrialized ecosystem. North Korea alone ran
    parallel campaigns: operatives getting hired into Amazon and other
    enterprises directly (1,800+ blocked since April 2024), a VS Code supply
    chain attack delivering BeaverTail/InvisibleFerret malware, and the
    PurpleBravo campaign compromising 3,136 IPs across 20 organizations via
    fake job interviews. Black Basta's leader was identified as having FSB/GRU
    ties. The Kimwolf and Aisuru botnets industrialized residential proxies
    across 2 million+ consumer devices to launder attack traffic through
    employee home networks — specifically targeting the VPN trust boundary
    between corporate and home environments.

    The third thread was AI crossing from governance topic to active
    operational threat on both sides. Attackers weaponized OpenAI's Assistants
    API as C2 infrastructure (SesameOp). A Google Gemini prompt injection flaw
    activated via calendar invite with zero user interaction. Malicious AI
    coding extensions amassed 1.5 million downloads before detection. And
    900,000 users had their AI conversations exfiltrated via "Prompt Poaching"
    Chrome extensions. By month-end, AI governance was a regulatory priority
    (EU opened a Grok investigation), a board risk, and an active attack
    surface simultaneously.

    By January 31, the pattern was unambiguous: the enterprise security model
    built on "trusted tools, trusted vendors, trusted employees" had become the
    primary attack surface.

period_analysis:
  dominant_patterns:
    - pattern: "Trust infrastructure weaponization (identity, supply chain, vendor tools)"
      frequency: "Appeared in 35 of 38 reports"
      significance: |
        The month's single dominant theme. Okta SSO was compromised via
        vishing to gain instant wholesale access to Salesforce, Microsoft 365,
        and Google Workspace. FortiGate firewalls were backdoored via a cloud
        SSO zero-day. AWS disclosed CodeBreach — a misconfiguration that could
        have poisoned SDK code delivered to every AWS customer. The VS Code
        supply chain attack, the n8n CVE-10.0, malicious Outlook add-ins, and
        compromised antivirus update channels all share the same structural
        story: approval at one point in time, exploitation forever after. For
        boards, the implication is that their vendor list is their attack surface
        — not a control.

    - pattern: "AI as attack vector and attack infrastructure"
      frequency: "Appeared in 22 of 38 reports"
      significance: |
        January confirmed AI had moved from theoretical risk to documented,
        active threat. Attackers used OpenAI's Assistants API as command-and-
        control (SesameOp). Malicious AI tools accumulated millions of downloads.
        Prompt injection in Google Gemini activated through routine calendar
        queries. North Korean actors ran Contagious Interview — using fake job
        interviews to deliver malware to developers. Organizations deploying AI
        without governance had already been breached through it before most
        governance frameworks were drafted.

    - pattern: "Residential proxy industrialization and identity-first attacks"
      frequency: "Appeared in 14 of 38 reports"
      significance: |
        The Kimwolf and Aisuru botnets' exploitation of 2M+ consumer devices
        as residential proxy infrastructure represents a structural shift in
        how attackers evade detection. By routing attacks through employee home
        networks, they inherit the trust that corporate VPN configurations
        extend to those devices. Combined with vishing-based Okta compromise
        (which bypasses MFA entirely by capturing credentials and session tokens
        in real time), identity-first attacks now represent the path of least
        resistance into enterprise environments.

  notable_escalations: |
    Two escalations stand apart from prior periods. First, North Korea's
    workforce infiltration program scaled to documented blocking of 1,800+
    operatives at Amazon alone — representing a confirmed insider threat
    campaign operating at industrial scale, with the goal of both revenue
    generation for weapons programs and long-term access to enterprise
    environments. Second, the AWS CodeBreach disclosure raised the prospect
    of supply chain compromise at cloud-platform level — not a single vendor,
    but the infrastructure layer beneath thousands of enterprise applications
    simultaneously. Neither of these was a speculative risk in January. Both
    were documented, active programs.

