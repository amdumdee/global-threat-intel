rollup_summary:
  title: "March 2026 Threat Intelligence Rollup — The Perimeter Is Everywhere"
  period: "March 2026"
  period_type: "monthly"
  rollup_id: "RU-202603-001"
  reports_synthesized: 31

  executive_summary: |
    March 2026 forced a reckoning with what "perimeter" means when the
    attack surface includes developer toolchains, executive personal Gmail
    accounts, kernel-level telecom implants dormant since 2021, a JavaScript
    library downloaded 83 million times weekly, and legitimate IT administration
    tools used to destroy devices across 79 countries. Every boundary
    organizations drew around "enterprise infrastructure" was breached or
    bypassed in March — not through exotic zero-days, but through systematic
    exploitation of trusted tools, trusted identities, and trusted vendors.

    The month's single most consequential event was March 28: Iranian
    state-linked group Handala carried out the first confirmed destructive
    wiper attack against a US Fortune 500 company. They entered Stryker via
    compromised Microsoft administrative credentials, then used legitimate IT
    administration tools — not specialized malware — to remotely destroy
    devices across 79 countries. No novel exploit required. The same week,
    Handala breached FBI Director Kash Patel's personal Gmail and published
    the contents. Executive personal accounts are now active geopolitical
    attack terrain.

    The supply chain thread was relentless and escalating. Aqua Security's
    Trivy vulnerability scanner — a security tool used to find flaws in
    software — was itself backdoored via compromised publishing credentials,
    turning it into a credential theft tool. The Axios JavaScript library
    (83 million weekly downloads) delivered remote access trojans silently
    via a dependency confusion attack. The LiteSpeed Cache WordPress plugin
    (6M+ installations) was compromised via SSO. A March 27 CISA advisory
    confirmed the tj-actions supply chain attack affected over 23,000
    repositories. Attackers are no longer going around the supply chain —
    they are the supply chain.

    Nation-state activity escalated across all four major adversary groups.
    China-linked Red Menshen's BPFDoor implants were found embedded inside
    telecommunications networks across the Middle East and Asia — placed there
    since at least 2021 and undetected for five years. Russia's CTRL toolkit
    enabled covert, persistent Windows access through legitimate remote desktop
    channels. The FCC formalized years of threat intelligence: all
    foreign-manufactured consumer routers are now on the federal Covered List,
    banned from import and sale, citing documented Volt Typhoon exploitation.
    And Claude Code was confirmed as the tool used to compromise Mexican
    government agencies and exfiltrate 150GB of data.

    By March 31, the pattern was definitive: there is no perimeter. There is
    only the sum of every trust relationship, every vendor dependency, every
    employee's personal account, and every tool in the stack — each of which
    is an active attack surface.

period_analysis:
  dominant_patterns:
    - pattern: "Developer toolchain and software supply chain as primary attack surface"
      frequency: "Appeared in 26 of 31 reports"
      significance: |
        March documented supply chain compromise at a scale and specificity not
        seen in prior months. Security tools themselves were backdoored (Trivy).
        A library with 83M weekly downloads delivered RATs (Axios). The
        tj-actions attack hit 23,000 repositories. VS Code extensions continued
        from prior months. Claude Code was used offensively against government
        targets. The structural problem: organizations have no effective
        governance model for the tools their developers use daily. Software
        composition analysis covers dependencies — it does not cover the tools
        that run the pipeline. March confirmed that gap is being actively
        exploited.

    - pattern: "Nation-state destructive and persistent access operations expanding scope"
      frequency: "Appeared in 22 of 31 reports"
      significance: |
        March escalated beyond intelligence collection into destruction. Handala's
        wiper attack against Stryker — using legitimate admin tools, not malware —
        is a structural shift: it means any organization with compromised
        Microsoft administrative credentials is exposed to destructive operations
        with no specialized intrusion required. BPFDoor's five-year undetected
        presence in telecom networks confirms that nation-state dwell time is
        measured in years, not weeks. The FCC router ban confirms regulatory
        acknowledgment of infrastructure-level supply chain risk from foreign
        hardware. Boards in critical infrastructure and defense-adjacent sectors
        face a fundamentally different threat than conventional ransomware.

    - pattern: "AI agent and agentic platform exploitation emerging as distinct attack category"
      frequency: "Appeared in 16 of 31 reports"
      significance: |
        March moved AI agent security from theoretical to documented incident
        category. Claude Code was used to breach Mexican government agencies.
        OpenClaw AI agent vulnerabilities enabled indirect prompt injection.
        Amazon Bedrock and LangSmith had exploitable weaknesses enabling data
        theft and account compromise. AI-powered browsers were targeted.
        Autonomous AI systems with access to enterprise systems, customer data,
        developer environments, and financial workflows are now confirmed
        compromise paths. The governance gap: most AI agent deployments have
        no access controls, audit logging, or permission boundaries equivalent
        to what would be required for a human with equivalent access.

  notable_escalations: |
    Two escalations in March stand apart from the preceding quarter. First,
    the Stryker wiper attack using legitimate IT administration tools sets a
    new precedent: destructive capability is now available to any attacker
    with administrative credential access, without requiring specialized
    malware or exploit code. The implication for every enterprise using
    Microsoft administrative tools is direct. Second, BPFDoor's confirmed
    five-year undetected presence in telecom networks reframes what "undetected"
    means: it is not measured in months but in years, and telecom infrastructure
    that routes national communications may already contain implants placed
    during a prior threat era. Both escalations require board-level response
    that goes beyond patching.

